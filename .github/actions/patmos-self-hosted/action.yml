name: Install Patmos (self-hosted)
description: Install Patmos and dependencies for self-hosted runners (no sudo)
inputs:
  clone-template:
    description: "Clone ulf-patmos-template next to reactor-uc"
    required: false
    default: "true"
runs:
  using: "composite"
  steps:
    - name: Clone and build Patmos
      shell: bash
      run: |
        if [ ! -d "$HOME/t-crest" ]; then
          echo "Building Patmos..."
          mkdir -p ~/t-crest
          cd ~/t-crest
          git clone https://github.com/t-crest/patmos-misc.git misc
          ./misc/build.sh -q
        else
          echo "t-crest already exists; skipping Patmos build"
        fi

        echo "$HOME/t-crest/local/bin" >> $GITHUB_PATH
      
    - name: Verify Patmos installation
      shell: bash
      run: |
        patmos-clang --version
        if [ $? -ne 0 ]; then
          echo "Patmos installation failed"
          exit 1
        fi

    - name: Verify jtagconfig installation
      shell: bash
      run: |
        export PATH="$PATH:$HOME/intelFPGA_lite/22.1std/quartus/bin"
        echo "$HOME/intelFPGA_lite/22.1std/quartus/bin" >> $GITHUB_PATH
        echo PATH is $PATH
        echo GITHUB_PATH is $GITHUB_PATH
        lsusb
        jtagd --version
        jtagconfig -d
        jtagconfig --version
        if [ $? -ne 0 ]; then
          echo "jtagconfig installation failed"
          exit 1
        fi

    - name: Clone template
      shell: bash
      run: |
        if [ -d "$GITHUB_WORKSPACE/../ulf-patmos-template" ]; then
          echo "ulf-patmos-template already exists; skipping clone"
          exit 0
        fi
        if [ "${{ inputs.clone-template }}" = "true" ]; then
          echo "Cloning ulf-patmos-template as sibling of reactor-uc..."
          # Clone one level up from GITHUB_WORKSPACE (which is reactor-uc/)
          cd "$GITHUB_WORKSPACE/.."
          git clone --depth=1 https://github.com/lf-lang/ulf-patmos-template.git ulf-patmos-template
          if [ ! -f "$GITHUB_WORKSPACE/../ulf-patmos-template/MakefileTemplate" ]; then
            echo "lfc: error: Patmos template not found at: $GITHUB_WORKSPACE/../ulf-patmos-template/MakefileTemplate";
            exit 1;
          fi
          echo "Template cloned successfully at $GITHUB_WORKSPACE/../ulf-patmos-template"
        fi
